<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morse Mine · Naval Telegraph Office</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E⚓%3C/text%3E%3C/svg%3E">
</head>
<body class="bg-ocean">

<main class="landing-wrap">
  <div class="landing-card">
    <div class="crest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="6" r="2"/>
        <line x1="12" y1="8" x2="12" y2="22"/>
        <path d="M5 14a7 7 0 0 0 14 0"/>
        <line x1="9" y1="11" x2="15" y2="11"/>
      </svg>
    </div>

    <h1 class="landing-title">Naval Telegraph Office</h1>
    <p class="landing-sub">Morse Mine · Est. 1912</p>

    <form id="codeForm" class="code-form" autocomplete="off">
      <label for="codeInput">Enter your station code</label>
      <input id="codeInput" class="code-input" type="text"
             placeholder="TX-XXXX"
             maxlength="8"
             autofocus
             required>
      <div id="errorBox" class="error-msg hidden"></div>
      <button type="submit" class="btn">Take Station</button>
    </form>

    <div class="landing-foot">
      <a href="leaderboard.html">Leaderboard</a>
      <a href="admin.html">Admin</a>
    </div>
  </div>
</main>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/shared.js"></script>

<script>
  const form    = document.getElementById('codeForm');
  const input   = document.getElementById('codeInput');
  const errBox  = document.getElementById('errorBox');

  // Auto-uppercase as user types
  input.addEventListener('input', () => {
    input.value = input.value.toUpperCase();
  });

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.remove('hidden');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.classList.add('hidden');
    const code = input.value.trim().toUpperCase();
    if (!code) return;

    const submitBtn = form.querySelector('button[type=submit]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Checking…';

    try {
      const result = await window.MM.findTeamByCode(code);
      if (!result) {
        showError('Unknown station code. Check with your instructor.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Take Station';
        return;
      }
      // Route to the correct screen with the code in the URL
      const target = result.role === 'transmitter'
        ? `transmitter.html?code=${encodeURIComponent(code)}`
        : `receiver.html?code=${encodeURIComponent(code)}`;
      window.location.href = target;
    } catch (err) {
      console.error(err);
      showError('Connection failed. Is Firebase configured?');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Take Station';
    }
  });
</script>

</body>
</html>
